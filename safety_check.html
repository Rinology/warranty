<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>제품 안전성 진단 센터</title>
  <link rel="stylesheet" href="./css/style.css">
  <meta name="theme-color" content="#e67e22">
</head>

<body>

  <div class="inquiry-container" style="border-top: 5px solid #e67e22;">
    <div class="nav-header">
      <div></div>
      <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="테마 전환">🌙</button>
      <div></div>
    </div>
    <h2>제품 안전성 진단</h2>
    <div class="sub-text">
      고객님의 제품이 안전한지 차대번호로 확인해 드립니다.<br>
      <b>차대번호 15자리</b>를 입력해 주세요.
    </div>

    <div class="input-group">
      <label>차대번호</label>
      <input type="text" id="serialInput" placeholder="예: 숫자 15자리 입력" maxlength="15" inputmode="numeric" pattern="[0-9]*" class="highlight-input">
      <div id="serialCount" style="text-align: left; font-size: 13px; color: #888; margin-top: 5px;">0자</div>
    </div>

    <button id="btnSafetyCheck" class="search-btn" style="background-color: #e67e22;">진단하기</button>

    <div id="loadingArea" class="loading-container">
      <div class="spinner" style="border-top-color: #e67e22;"></div>
      <span id="loadingText" class="loading-msg">진단 중입니다...</span>
    </div>

    <div id="resultBox" class="message-box" style="display: none; padding: 25px; border-radius: 8px; margin-top: 20px; text-align: left;">
      <!-- 결과 내용이 여기에 표시됩니다 -->
    </div>

    <div class="footer-area">
      <div class="footer-logo">
        <img id="footerLogo" src="./images/Xtron_x_Qualisports_Logo_Black.png" alt="XTRON x QUALISPORTS">
      </div>
      <div class="footer-cs-info">
        퀄리스포츠 CS센터: 1666-4756<br>
        운영시간: 평일 10:00 ~ 18:00 (점심 13:00 ~ 14:00)
      </div>
    </div>
  </div>

  <!-- 커스텀 카카오톡 복사 모달 -->
  <div id="customCopyModal" class="modal-overlay" style="z-index: 3000; display: none;">
    <div class="modal-box" style="max-width: 320px; text-align: center;">
      <div class="modal-header" style="position: relative; justify-content: center; background: #FEE500; color: #3c1e1e; border-bottom: none;">
        <span style="font-weight: 900;">차대번호가 복사되었습니다</span>
        <button id="btnCloseModal" class="modal-close" style="position: absolute; right: 20px; color: #3c1e1e; font-size: 24px;">&times;</button>
      </div>
      <div class="modal-content" style="padding: 30px 20px; white-space: normal; text-align: center;">
        <div style="font-size: 40px; margin-bottom: 15px;">📋</div>
        <p style="color: var(--ci-dark); font-size: 14px; line-height: 1.6; margin-bottom: 0; font-weight: 600;">
          카카오톡 대화창이 열리면<br>
          <b>'붙여넣기'</b>하신 후 메시지를 전송해주세요.
        </p>
      </div>
      <div class="modal-footer" style="padding: 0;">
        <button id="btnGoKakao" class="modal-btn" style="width: 100%; border-radius: 0; padding: 16px; font-size: 15px; background: #FEE500; color: #3c1e1e; font-weight: 900;">카카오톡으로 이동하기</button>
      </div>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/safety_check.js"></script>
</body>

</html>
